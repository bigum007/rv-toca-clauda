<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Vondráček Family World 🏠</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══ TITLE SCREEN ═══ -->
<div id="title-screen">
  <div class="title-bg-circles">
    <div class="tc c1"></div><div class="tc c2"></div>
    <div class="tc c3"></div><div class="tc c4"></div>
  </div>
  <div id="title-stars"></div>

  <div class="title-center">
    <div class="title-house">🏡</div>
    <h1 class="title-heading">
      <span class="title-line1">Vondráček</span>
      <span class="title-line2">Family World</span>
    </h1>
    <p class="title-sub">A magical world made just for us ✨</p>
    <button id="btn-start">Let's Play!</button>
  </div>

  <div id="title-chars"></div>
</div>

<!-- ═══ GAME WORLD ═══ -->
<div id="world" class="hidden">

  <!-- Scene rail: all 5 scenes side-by-side, swipe to navigate -->
  <div id="scene-rail">
    <div class="scene-panel" data-scene="living-room"  data-bg="#FDEFD8"></div>
    <div class="scene-panel" data-scene="kitchen"      data-bg="#E8F5E9"></div>
    <div class="scene-panel" data-scene="garden"       data-bg="#87CEEB"></div>
    <div class="scene-panel" data-scene="bedroom"      data-bg="#EDE7F6"></div>
    <div class="scene-panel" data-scene="art-studio"   data-bg="#FFF8E1"></div>
  </div>

  <!-- Minimal HUD — floats over everything -->
  <div id="hud">
    <!-- Scene name — fades in/out on scene switch -->
    <div id="scene-label"></div>

    <!-- Navigation dots -->
    <div id="scene-dots">
      <span class="dot" data-idx="0"></span>
      <span class="dot" data-idx="1"></span>
      <span class="dot" data-idx="2"></span>
      <span class="dot" data-idx="3"></span>
      <span class="dot" data-idx="4"></span>
    </div>

    <!-- Cast button: open character picker -->
    <button id="btn-cast" title="Family">👥</button>

    <!-- Menu button -->
    <button id="btn-menu" title="Menu">⚙️</button>
  </div>

  <!-- Character picker drawer (slides up) -->
  <div id="cast-drawer">
    <div class="drawer-handle"></div>
    <p class="drawer-title">Family 👨‍👩‍👧‍👦</p>
    <div id="cast-list"></div>
  </div>

  <!-- Menu drawer (slides up) -->
  <div id="menu-drawer">
    <div class="drawer-handle"></div>
    <div class="menu-buttons">
      <button class="menu-btn" id="btn-save">💾 Save</button>
      <button class="menu-btn" id="btn-export">📦 Backup</button>
      <button class="menu-btn" id="btn-import">📂 Load</button>
      <button class="menu-btn" id="btn-home">🏠 Title</button>
    </div>
  </div>

  <!-- Speech bubble (shown on character tap) -->
  <div id="speech-bubble" class="hidden"><span id="bubble-text"></span></div>

  <!-- Toast -->
  <div id="toast" class="hidden"></div>
</div>

<input type="file" id="file-import" accept=".json" style="display:none">

<script src="js/characters.js"></script>
<script src="js/scenes.js"></script>
<script src="js/engine.js"></script>
<script src="js/main.js"></script>
</body>
</html>
